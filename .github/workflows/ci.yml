# .github/workflows/ci.yml
# Pipeline de CI: corre en cada push y PR
# Verifica que la aplicación arranca correctamente

name: CI

on:
  push:
    branches: [ main, fase-* ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    name: Build & Smoke Test
    runs-on: windows-latest   # Windows para simular el entorno real

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar que no hay secretos en .env
        shell: pwsh
        run: |
          if (Test-Path ".env") {
            Write-Error ".env NO debe estar en el repositorio. Agrégalo a .gitignore"
            exit 1
          }
          Write-Host "OK: .env no está en el repositorio"

      - name: Verificar estructura del proyecto
        shell: pwsh
        run: |
          $required = @(
            "src/server.js",
            "src/db/database.js",
            "src/routes/api.js",
            "src/services/netstat.service.js",
            "src/services/dns.service.js",
            "src/services/geo.service.js",
            "src/services/reputation.service.js",
            "src/services/alert.service.js",
            "src/services/firewall.service.js",
            "public/index.html",
            ".env.example"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              Write-Error "Archivo requerido no encontrado: $file"
              exit 1
            }
          }
          Write-Host "OK: Todos los archivos requeridos presentes"

      - name: Verificar sintaxis JavaScript
        run: node --check src/server.js && node --check src/routes/api.js

      - name: Smoke test - arrancar servidor HTTPS
        shell: pwsh
        env:
          PORT: 3001
          HOST: 127.0.0.1
          NODE_ENV: test
          DB_PATH: ./data/test.db
          MASTER_USER: admin
          MASTER_PASS: testpass123
          JWT_SECRET: test-secret-for-ci-only
        run: |
          New-Item -ItemType Directory -Force -Path "./data" | Out-Null
          $proc = Start-Process node -ArgumentList "src/server.js" -PassThru -WindowStyle Hidden
          $procId = $proc.Id
          Write-Host "Servidor iniciado con PID: $procId"
          Start-Sleep -Seconds 15
          $result = curl.exe --insecure --silent --output NUL --write-out "%{http_code}" "https://127.0.0.1:3001/auth/login"
          Write-Host "Codigo HTTP recibido: $result"
          Get-Process -Id $procId -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if ($result -eq "200") {
            Write-Host "OK: Smoke test completado"
          } else {
            Write-Error "Smoke test fallido - codigo: $result"
            exit 1
          }
