# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main, fase-* ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    name: Build & Smoke Test
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Verificar que no hay secretos en .env
        shell: pwsh
        run: |
          if (Test-Path ".env") {
            Write-Error ".env NO debe estar en el repositorio"
            exit 1
          }
          Write-Host "OK: .env no está en el repositorio"

      - name: Verificar estructura del proyecto
        shell: pwsh
        run: |
          $required = @(
            "src/server.js",
            "src/db/database.js",
            "src/routes/api.js",
            "src/services/netstat.service.js",
            "src/services/dns.service.js",
            "src/services/geo.service.js",
            "src/services/reputation.service.js",
            "src/services/alert.service.js",
            "src/services/firewall.service.js",
            "src/services/auth.service.js",
            "src/services/tls.service.js",
            "src/middleware/auth.middleware.js",
            "public/index.html",
            "public/auth/login.html",
            ".env.example"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              Write-Error "Archivo requerido no encontrado: $file"
              exit 1
            }
          }
          Write-Host "OK: Todos los archivos requeridos presentes"

      - name: Verificar sintaxis JavaScript
        shell: pwsh
        run: |
          node --check src/server.js
          node --check src/routes/api.js
          node --check src/services/auth.service.js
          node --check src/middleware/auth.middleware.js
          Write-Host "OK: Sintaxis JavaScript válida"

      - name: Smoke test - arrancar servidor HTTPS
        shell: pwsh
        env:
          PORT: 3001
          HOST: 127.0.0.1
          NODE_ENV: test
          DB_PATH: ./data/test.db
          MASTER_USER: admin
          MASTER_PASS: testpass123
          JWT_SECRET: test-secret-for-ci-only
        run: |
          New-Item -ItemType Directory -Force -Path "./data" | Out-Null

          # Iniciar servidor en background y capturar PID
          $proc = Start-Process node -ArgumentList "src/server.js" -PassThru -WindowStyle Hidden
          $pid  = $proc.Id
          Write-Host "Servidor iniciado con PID: $pid"

          # Esperar que arranque (HTTPS + generacion de cert toma mas tiempo)
          Start-Sleep -Seconds 15

          # Verificar respuesta usando curl con --insecure (certificado autofirmado)
          $result = curl.exe --insecure --silent --output NUL --write-out "%{http_code}" "https://127.0.0.1:3001/auth/login"
          Write-Host "Codigo HTTP recibido: $result"

          # Detener servidor sin importar el resultado
          Get-Process -Id $pid -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          # Evaluar resultado
          if ($result -eq "200") {
            Write-Host "OK: Smoke test completado - servidor HTTPS respondio correctamente"
          } else {
            Write-Error "Smoke test fallido - codigo HTTP inesperado: $result"
            exit 1
          }
