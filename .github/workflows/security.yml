# .github/workflows/security.yml
name: Security Scan

on:
  push:
    branches: [ main, fase-* ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

jobs:

  npm-audit:
    name: NPM Audit (Supply Chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: NPM Audit — solo dependencias directas críticas
        run: |
          # Auditar solo high/critical en dependencias que controlamos directamente
          # Las vulnerabilidades en sub-dependencias de sqlite3 son conocidas
          # y se mitigan actualizando sqlite3 a v6+
          npm audit --audit-level=high --omit=dev || true
          # Generar reporte completo para referencia
          npm audit --json > npm-audit-report.json || true
          # Fallar solo si hay vulnerabilidades críticas en deps directas
          node -e "
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('npm-audit-report.json'));
            const vulns = report.vulnerabilities || {};
            const directCritical = Object.values(vulns).filter(v =>
              v.severity === 'critical' && v.isDirect
            );
            if (directCritical.length > 0) {
              console.error('CRITICAL vulnerabilities in direct dependencies:', directCritical.map(v=>v.name));
              process.exit(1);
            }
            console.log('OK: No critical vulnerabilities in direct dependencies');
          "

      - name: Subir reporte de audit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  secret-scan:
    name: Secret Detection (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL Analysis (SAST)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Verificar licencias
        run: |
          npm install -g license-checker
          license-checker \
            --onlyAllow 'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;Unlicense;Python-2.0;CC0-1.0;BlueOak-1.0.0;WTFPL;Artistic-2.0;CC-BY-3.0;CC-BY-4.0' \
            --excludePrivatePackages \
            --excludePackages 'netwatch@2.0.0' \
            --json > license-report.json
          echo "Licencias verificadas correctamente"

      - uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.json
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, secret-scan, codeql, license-check]
    if: always()
    steps:
      - name: Resumen
        run: |
          echo "## Resumen de Seguridad" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
