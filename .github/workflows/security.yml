# .github/workflows/security.yml
# Pipeline de seguridad completo:
# 1. Audit de dependencias npm
# 2. Detección de secretos (GitLeaks)
# 3. Análisis estático de código (CodeQL)
# 4. Reporte consolidado

name: Security Scan

on:
  push:
    branches: [ main, fase-* ]
  pull_request:
    branches: [ main ]
  schedule:
    # Escaneo automático todos los lunes a las 8:00 AM
    - cron: '0 8 * * 1'

jobs:

  # ── JOB 1: Vulnerabilidades en dependencias npm ──────────────
  npm-audit:
    name: NPM Audit (Supply Chain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: NPM Audit (vulnerabilidades conocidas)
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - name: NPM Audit JSON (para reporte)
        if: failure()
        run: npm audit --json > npm-audit-report.json || true

      - name: Subir reporte de audit
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

  # ── JOB 2: Detección de secretos en el código ────────────────
  secret-scan:
    name: Secret Detection (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Escanear todo el historial de commits

      - name: Ejecutar GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GitLeaks detecta: API keys, tokens, passwords, private keys
        # hardcodeadas en cualquier archivo o commit del historial

  # ── JOB 3: Análisis estático de código (CodeQL) ──────────────
  codeql:
    name: CodeQL Analysis (SAST)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write  # Para publicar resultados en Security tab

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality
          # Detecta: SQL injection, XSS, path traversal,
          # code injection, insecure randomness, etc.

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ── JOB 4: Detección de dependencias con licencias problemáticas
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar license-checker
        run: npm install -g license-checker

      - name: Verificar licencias permitidas
        run: |
          license-checker --onlyAllow \
            'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;Unlicense;Python-2.0;CC0-1.0' \
            --excludePrivatePackages \
            --json > license-report.json
          echo "Todas las licencias son compatibles"

      - name: Subir reporte de licencias
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.json
          retention-days: 30

  # ── JOB 5: Resumen de seguridad ──────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, secret-scan, codeql, license-check]
    if: always()
    steps:
      - name: Resumen de resultados
        run: |
          echo "## Resumen de Seguridad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL SAST | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
