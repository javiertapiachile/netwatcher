<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetWatch — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080c10; --bg2: #0d1117; --bg3: #111820;
      --border: #1e2d3d; --border2: #243447;
      --accent: #00e5ff; --accent2: #00b8cc;
      --accent-dim: rgba(0,229,255,0.08);
      --green: #39ff8f; --red: #ff4d6a; --yellow: #ffd166;
      --text: #c9d8e8; --text2: #7a9ab5; --text3: #4a6272;
      --font-mono: 'JetBrains Mono', monospace;
      --font-ui: 'Syne', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.15) 2px,rgba(0,0,0,.15) 4px);
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      display: block;
      font-size: 2.5rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      animation: pulse 3s ease-in-out infinite;
      margin-bottom: 8px;
    }
    .logo-text {
      font-family: var(--font-ui);
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 4px;
      color: var(--text);
      text-transform: uppercase;
    }
    .logo-text strong { color: var(--accent); font-weight: 800; }
    .logo-sub {
      font-size: .68rem;
      color: var(--text3);
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 0 40px rgba(0,0,0,.5), 0 0 80px rgba(0,229,255,.04);
    }
    .card-title {
      font-size: .7rem;
      letter-spacing: 2.5px;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: .65rem;
      letter-spacing: 1.5px;
      color: var(--text3);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: .85rem;
      padding: 10px 14px;
      border-radius: 6px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(0,229,255,.1);
    }
    input::placeholder { color: var(--text3); }
    .btn-login {
      width: 100%;
      background: var(--accent-dim);
      border: 1px solid var(--accent2);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 11px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, box-shadow .2s, transform .1s;
    }
    .btn-login:hover { background: rgba(0,229,255,.15); box-shadow: 0 0 16px rgba(0,229,255,.25); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg {
      background: rgba(255,77,106,.1);
      border: 1px solid rgba(255,77,106,.3);
      color: var(--red);
      font-size: .72rem;
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }
    .ssl-notice {
      margin-top: 20px;
      text-align: center;
      font-size: .65rem;
      color: var(--text3);
      line-height: 1.6;
    }
    .ssl-notice span { color: var(--yellow); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    .spinner { display: inline-block; animation: spin .7s linear infinite; }
    @keyframes spin { from{transform:rotate(0)}to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <div class="logo-text">NET<strong>WATCH</strong></div>
      <div class="logo-sub">Monitor de Seguridad de Red</div>
    </div>

    <div class="card">
      <div class="card-title">Acceso al Dashboard</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          INICIAR SESIÓN
        </button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>

    <div class="ssl-notice">
      <span>⚠ Certificado autofirmado</span><br>
      Si el navegador muestra una advertencia, haz clic en<br>
      "Avanzado" → "Continuar a localhost"
    </div>
  </div>

  <script>
    const form    = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return;

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<span class="spinner">↻</span> AUTENTICANDO...';
      errorMsg.classList.remove('show');

      try {
        const res  = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.ok) {
          btnLogin.innerHTML = '✓ ACCESO CONCEDIDO';
          window.location.href = data.redirect || '/';
        } else {
          errorMsg.textContent = data.error || 'Credenciales incorrectas';
          errorMsg.classList.add('show');
          btnLogin.disabled = false;
          btnLogin.innerHTML = 'INICIAR SESIÓN';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorMsg.textContent = 'Error de conexión con el servidor';
        errorMsg.classList.add('show');
        btnLogin.disabled = false;
        btnLogin.innerHTML = 'INICIAR SESIÓN';
      }
    });

    // Auto-focus en el campo usuario
    document.getElementById('username').focus();
  </script>
</body>
</html>
